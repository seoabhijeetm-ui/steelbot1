<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SteelBot Pro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        #chat-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
        }

        .user-message {
            background: #007bff;
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: right;
        }

        .bot-message {
            background: #e9e9e9;
            color: #333;
            padding: 10px 15px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: left;
        }

        #input-area {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <h1>🤖 SteelBot Pro</h1>

    <div id="chat-box">
        <div class="bot-message">Hello! I am SteelBot Pro. Ask me anything about steel!</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask about steel..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            // Get user message
            const input = document.getElementById("user-input");
            const message = input.value.trim();
            if (!message) return;

            // Show user message in chat
            addMessage(message, "user-message");
            input.value = "";

            // Show loading
            addMessage("Thinking...", "bot-message");

            // Send to FastAPI
            const response = await fetch("http://localhost:8000/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    message: message,
                    personality: "professional",
                    session_id: "web-user"
                })
            });

            const data = await response.json();

            // Remove "Thinking..." and show real reply
            removeLastMessage();
            addMessage(data.reply, "bot-message");
        }

        function addMessage(text, className) {
            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = className;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeLastMessage() {
            const chatBox = document.getElementById("chat-box");
            chatBox.removeChild(chatBox.lastChild);
        }

        // Send message on Enter key
        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>

</body>
</html>
